<template>
    <lightning-card title="My Day" icon-name="standard:today">
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                title="Refresh"
                onclick={handleRefresh}
            ></lightning-button-icon>
        </div>

        <div class="slds-card__body slds-card__body_inner">
            <template if:true={isLoading}>
                <div class="slds-text-align_center slds-p-vertical_medium">
                    <lightning-spinner alternative-text="Loading today's visits" size="small"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <!-- Status Summary -->
                <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_medium">
                    <div class="slds-col slds-size_1-of-3">
                        <div class="slds-box slds-box_x-small slds-text-align_center">
                            <div class="slds-text-heading_large">{scheduledCount}</div>
                            <div class="slds-text-body_small slds-text-color_weak">Scheduled</div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <div class="slds-box slds-box_x-small slds-text-align_center">
                            <div class="slds-text-heading_large">{inProgressCount}</div>
                            <div class="slds-text-body_small slds-text-color_weak">In Progress</div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <div class="slds-box slds-box_x-small slds-text-align_center">
                            <div class="slds-text-heading_large">{pendingCount}</div>
                            <div class="slds-text-body_small slds-text-color_weak">Pending</div>
                        </div>
                    </div>
                </div>

                <!-- Today's Visits -->
                <template if:true={hasVisits}>
                    <p class="slds-text-heading_small slds-m-bottom_small">Today's Visits</p>
                    <ul class="slds-has-dividers_bottom-space">
                        <template for:each={visits} for:item="visit">
                            <li key={visit.id} class="slds-item">
                                <article class="slds-tile slds-tile_board">
                                    <div class="slds-tile__detail">
                                        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                                            <div class="slds-col">
                                                <p class="slds-text-heading_small">
                                                    <a onclick={handleViewAccount} data-accountid={visit.accountId} class="slds-cursor_pointer">
                                                        {visit.householdName}
                                                    </a>
                                                </p>
                                                <p class="slds-text-body_small slds-text-color_weak">
                                                    Visit: {visit.visitName}
                                                </p>
                                            </div>
                                            <div class="slds-col_bump-left">
                                                <span class="slds-badge">{visit.householdVisitStatus}</span>
                                            </div>
                                        </div>

                                        <template if:true={visit.address}>
                                            <div class="slds-m-bottom_small">
                                                <lightning-icon icon-name="utility:location" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                <span class="slds-text-body_small">{visit.address}</span>
                                            </div>
                                        </template>

                                        <template if:true={visit.scheduledDate}>
                                            <div class="slds-m-bottom_small">
                                                <lightning-icon icon-name="utility:clock" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                <span class="slds-text-body_small">
                                                    <lightning-formatted-date-time value={visit.scheduledDate} hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                                </span>
                                            </div>
                                        </template>

                                        <div class="slds-m-top_small">
                                            <lightning-button-group>
                                                <lightning-button
                                                    label="Start Visit"
                                                    onclick={handleStartVisit}
                                                    data-id={visit.id}
                                                    variant="brand"
                                                ></lightning-button>
                                                <template if:true={visit.address}>
                                                    <lightning-button
                                                        label="Get Directions"
                                                        onclick={handleGetDirections}
                                                        data-address={visit.address}
                                                        icon-name="utility:directions"
                                                    ></lightning-button>
                                                </template>
                                            </lightning-button-group>
                                        </div>
                                    </div>
                                </article>
                            </li>
                        </template>
                    </ul>
                </template>

                <template if:false={hasVisits}>
                    <div class="slds-text-align_center slds-m-vertical_medium">
                        <lightning-icon icon-name="utility:check" alternative-text="No visits" size="large" class="slds-m-bottom_small"></lightning-icon>
                        <p class="slds-text-heading_small slds-m-bottom_x-small">No visits scheduled for today</p>
                        <p class="slds-text-body_regular slds-text-color_weak">Enjoy your day!</p>
                    </div>
                </template>

                <template if:true={error}>
                    <div class="slds-text-color_error slds-m-top_small">
                        Error loading visits. Please refresh the page.
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
