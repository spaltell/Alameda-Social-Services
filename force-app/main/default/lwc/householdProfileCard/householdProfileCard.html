<template>
    <lightning-card icon-name="standard:account">
        <div slot="title">
            <div class="slds-media slds-media_center">
                <div class="slds-media__figure">
                    <span class="slds-icon_container slds-icon-standard-account">
                        <lightning-icon icon-name="standard:home" size="small"></lightning-icon>
                    </span>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span class="slds-text-heading_small">Household Profile</span>
                    </h2>
                </div>
            </div>
        </div>

        <div slot="actions">
            <lightning-button-group>
                <lightning-button label="Create Visit" onclick={handleCreateVisit} variant="brand"></lightning-button>
                <lightning-button label="View All" onclick={handleViewAllVisits}></lightning-button>
            </lightning-button-group>
        </div>

        <div class="slds-card__body slds-card__body_inner slds-p-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading household profile" size="small"></lightning-spinner>
            </template>

            <template if:false={isLoading}>
                <!-- Alert Badges -->
                <template if:true={showOverdueAlert}>
                    <div class="alert-banner alert-warning slds-m-bottom_medium">
                        <lightning-icon icon-name="utility:warning" alternative-text="Warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <span class="alert-text"><strong>Overdue Visit:</strong> {daysSinceLastVisit} days since last visit</span>
                    </div>
                </template>

                <template if:true={showPendingExceptionAlert}>
                    <div class="alert-banner alert-info slds-m-bottom_medium">
                        <lightning-icon icon-name="utility:info" alternative-text="Info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <span class="alert-text">Pending exceptions under review</span>
                    </div>
                </template>

                <template if:true={hasVisits}>
                    <!-- Last Visit & Authorized Hours Grid -->
                    <div class="slds-grid slds-gutters slds-m-bottom_medium">
                        <!-- Last Visit Summary -->
                        <div class="slds-col slds-size_1-of-2">
                            <div class="info-card">
                                <div class="info-card__header">
                                    <lightning-icon icon-name="utility:event" size="x-small" class="slds-m-right_x-small icon-accent"></lightning-icon>
                                    <span class="info-card__title">Last Visit</span>
                                </div>
                                <div class="info-card__body">
                                    <div class="stat-primary">
                                        <lightning-formatted-date-time value={mostRecentVisit.completedDate} year="numeric" month="short" day="numeric"></lightning-formatted-date-time>
                                    </div>
                                    <div class="stat-secondary">
                                        {daysSinceLastVisit} days ago
                                    </div>
                                    <template if:true={mostRecentVisit.riskLevel}>
                                        <div class="slds-m-top_x-small">
                                            <span class={riskLevelBadgeClass}>
                                                {mostRecentVisit.riskLevel}
                                            </span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Authorized Hours -->
                        <div class="slds-col slds-size_1-of-2">
                            <div class="info-card">
                                <div class="info-card__header">
                                    <lightning-icon icon-name="utility:clock" size="x-small" class="slds-m-right_x-small icon-accent"></lightning-icon>
                                    <span class="info-card__title">Authorized Hours</span>
                                </div>
                                <div class="info-card__body">
                                    <template if:true={hasAuthorizedHours}>
                                        <div class="stat-primary slds-m-bottom_x-small">{totalHours} hrs/week</div>
                                        <div class="hours-breakdown">
                                            <template for:each={authorizedHours} for:item="hour">
                                                <div key={hour.label} class="hours-item">
                                                    <span class="hours-label">{hour.label}</span>
                                                    <span class="hours-value">{hour.value} hrs</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={hasAuthorizedHours}>
                                        <div class="stat-secondary">No hours authorized</div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Visits -->
                    <div class="section-header slds-m-bottom_small">
                        <lightning-icon icon-name="utility:file" size="x-small" class="slds-m-right_x-small icon-accent"></lightning-icon>
                        <span class="section-title">Recent Visits</span>
                    </div>

                    <div class="visits-list">
                        <template for:each={visitHistory.recentVisits} for:item="visit">
                            <div key={visit.id} class="visit-card" data-id={visit.id} onclick={navigateToVisit}>
                                <div class="visit-card__header">
                                    <span class="visit-number">{visit.name}</span>
                                    <span class={visit.statusClass}>{visit.householdVisitStatus}</span>
                                </div>
                                <div class="visit-card__meta">
                                    <span class="visit-date">
                                        <lightning-icon icon-name="utility:date_time" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                        <lightning-formatted-date-time value={visit.completedDate} year="numeric" month="short" day="numeric"></lightning-formatted-date-time>
                                    </span>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <template if:false={hasVisits}>
                    <div class="empty-state">
                        <lightning-icon icon-name="utility:info" alternative-text="No visits" size="small" class="empty-state__icon"></lightning-icon>
                        <p class="empty-state__text">No visits recorded for this household</p>
                    </div>
                </template>

                <template if:true={error}>
                    <div class="slds-text-color_error slds-m-top_small">
                        Error loading visit history. Please refresh the page.
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
